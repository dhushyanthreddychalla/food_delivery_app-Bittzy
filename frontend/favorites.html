<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Favorites</title>
  <link rel="stylesheet" href="./css/theme.css"/>
  <link rel="stylesheet" href="./css/common.css"/>
  <style>
    .fav-item-card {
      background: var(--bg-white);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.05);
      box-shadow: 0 10px 30px rgba(0,0,0,.03);
      transition: 0.3s;
    }
    .fav-item-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,.08); }
    .fav-img { width: 100%; height: 160px; object-fit: cover; }
    .fav-info { padding: 16px; }
    .fav-name { font-weight: 800; font-size: 16px; margin-bottom: 4px; }
    .fav-price { color: var(--orange); font-weight: 1000; font-size: 18px; }
    .fav-actions { display: flex; gap: 8px; margin-top: 12px; }
    
    html.dark .fav-item-card { background: #1a1a1a; border-color: rgba(255,255,255,.05); }
  </style>
</head>
<body class="page-in">
  <div id="scrollProgress"></div>
<div class="mesh-bg"></div>
<div id="floatingIcons"></div>

<header class="topbar stagger-in">
  <div class="nav">
    <div class="brand">
      <div class="logo">❤️</div>
      <div>
        Favorites
        <div style="font-size:12px;opacity:.9;font-weight:700">Your saved items</div>
      </div>
    </div>
    <div class="nav-right" style="display:flex; align-items:center; gap:12px;">
      <a class="navbtn" href="index.html">🏠 Home</a>
      <a class="navbtn" id="themeToggle">🌙 Dark</a>
      <button class="navbtn" id="notifBtn" style="position:relative; background:none; border:none; color:inherit; cursor:pointer; font-size:16px;">
        🔔
        <span class="notifBadge" style="display:none;">0</span>
      </button>
      <a class="navbtn" href="cart.html">
        🛒 Cart <span class="cart-badge"></span>
      </a>
    </div>
  </div>
</header>
<main class="wrap">
  <div class="menu-top" style="padding:40px 0 20px; display:flex; justify-content:space-between; align-items:center;">
    <div>
      <h2 class="section-title" style="margin:0; font-size:28px; font-weight:1000;">Favorite Items ❤️</h2>
      <p class="section-sub" style="margin-top:6px; color:var(--muted); font-weight:800;">Your personally curated list of deliciousness</p>
    </div>
    <a class="btn ghost" href="menu.html" style="text-decoration:none; padding:10px 20px; border-radius:12px; border:1px solid rgba(0,0,0,0.1); font-weight:1000; color:inherit;">➕ Add More</a>
  </div>

  <section class="menu-grid" id="favGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:20px; margin-top:20px;"></section>
</main>

<nav class="bottom-nav" style="position:fixed; bottom:0; left:0; right:0; background:var(--bg-white); display:flex; justify-content:space-around; padding:12px; border-top:1px solid rgba(0,0,0,0.05); z-index:1000;">
  <a href="index.html" style="text-decoration:none; color:inherit; text-align:center;"><div style="font-size:20px;">🏠</div><div style="font-size:10px; font-weight:800;">Home</div></a>
  <a href="menu.html" style="text-decoration:none; color:inherit; text-align:center;"><div style="font-size:20px;">🍽️</div><div style="font-size:10px; font-weight:800;">Menu</div></a>
  <a href="cart.html" style="text-decoration:none; color:inherit; text-align:center;"><div style="font-size:20px;">🛒</div><div style="font-size:10px; font-weight:800;">Cart</div></a>
  <a href="favorites.html" class="active" style="text-decoration:none; color:var(--orange); text-align:center;"><div style="font-size:20px;">❤️</div><div style="font-size:10px; font-weight:800;">Favs</div></a>
</nav>
<script src="./js/auth.js"></script>
<script src="./js/notifications.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/common.js"></script>
<script src="./js/theme.js"></script>
<script src="./js/favs.js"></script>
</body>
</html>
